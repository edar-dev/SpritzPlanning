name: Integration (scheduled)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.6'
          cache: true

      - name: Verify Flutter version
        run: bash scripts/check-flutter-version.sh
        env:
          FLUTTER_VERSION: '3.35.6'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Integration test (Supabase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_TEST }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_TEST }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: Set SUPABASE_URL_TEST and SUPABASE_ANON_KEY_TEST in repository secrets."
            exit 1
          fi
          flutter test integration/room_flow_integration_test.dart \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
