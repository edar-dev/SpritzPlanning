name: Deploy smoke

on:
  workflow_dispatch:
  deployment_status:

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment == 'Production')
    steps:
      # Full manual E2E checklist: docs/LEAN-SMOKE.md § Flusso E2E stanza
      - name: Smoke production URLs
        run: |
          curl -fsSL -o /dev/null -w "%{http_code}\n" https://spritz-planning.vercel.app/
          curl -fsSL https://spritz-planning.vercel.app/ | grep -qi "planning poker"
          curl -fsSL -o /dev/null -w "%{http_code}\n" https://spritz-planning.vercel.app/robots.txt
          curl -fsSL -o /dev/null -w "%{http_code}\n" https://spritz-planning.vercel.app/sitemap.xml
          curl -fsSL -o /dev/null -w "%{http_code}\n" https://spritz-planning.vercel.app/help
          curl -fsSL -o /dev/null -w "%{http_code}\n" https://spritz-planning.vercel.app/en/help
          curl -fsSL -o /dev/null -w "%{http_code}\n" https://spritz-planning.vercel.app/app/
          curl -fsSL -o /dev/null -w "%{http_code}\n" https://spritz-planning.vercel.app/app/manifest.json
          curl -fsSL -o /dev/null -w "%{http_code}\n" https://spritz-planning.vercel.app/icons/Icon-512.png
          curl -fsSL -o /dev/null -w "%{http_code}\n" https://spritz-planning.vercel.app/.well-known/assetlinks.json || true
