# Applies pending SQL migrations to the linked Supabase project on merge to main.
# Requires repository secret: SUPABASE_ACCESS_TOKEN (Personal Access Token from supabase.com/dashboard/account/tokens)

name: Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  db-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Supabase access token
        id: token
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SUPABASE_ACCESS_TOKEN not set — skipping db push."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v1
        if: steps.token.outputs.configured == 'true'
        with:
          version: latest

      - name: Link project
        if: steps.token.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref eyvfsgzbrdibheyejikf --yes

      - name: Push migrations
        if: steps.token.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --yes
